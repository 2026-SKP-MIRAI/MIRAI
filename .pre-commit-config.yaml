repos:
  # 불변식 검증 (엔진 경계 강제)
  - repo: local
    hooks:
      - id: check-llm-invariant
        name: "불변식 2 — LLM 호출 위치 검증 (Python)"
        entry: python scripts/check_invariants.py --check llm
        language: python
        types: [python]
        pass_filenames: false

      - id: check-pdf-invariant
        name: "불변식 2 — PDF 파싱 위치 검증 (Python)"
        entry: python scripts/check_invariants.py --check pdf
        language: python
        types: [python]
        pass_filenames: false

      - id: check-ts-llm-invariant
        name: "불변식 2 — LLM 호출 위치 검증 (TypeScript)"
        entry: python scripts/check_invariants.py --check ts-llm
        language: python
        types_or: [ts, tsx, javascript, jsx]
        pass_filenames: false

      - id: check-auth-invariant
        name: "불변식 1 — 엔진 내 인증 코드 금지"
        entry: python scripts/check_invariants.py --check auth
        language: python
        types: [python]
        pass_filenames: false

      - id: check-forbidden-files
        name: "레포 규칙 2 — 금지 파일 형식 커밋 차단"
        entry: python scripts/check_forbidden_files.py
        language: python
        pass_filenames: false
        always_run: true

  # 코드 품질 (기본)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=5120"]   # 5MB 초과 파일 커밋 차단 (레포 규칙 1번)
