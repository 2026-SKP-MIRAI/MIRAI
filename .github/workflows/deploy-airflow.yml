name: Deploy Airflow to EC2

on:
  push:
    branches: [main]
    paths:
      - 'services/siw/airflow/**'
  workflow_dispatch:
    inputs:
      skip_build:
        description: '빌드 생략하고 재시작만 (서버 재시작용)'
        type: boolean
        default: false

jobs:
  build-and-push-airflow:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.skip_build == false }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login
      - name: Build and push airflow
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build \
            -t $ECR_REGISTRY/mirai-airflow:latest \
            -t $ECR_REGISTRY/mirai-airflow:${{ github.sha }} \
            -f services/siw/airflow/Dockerfile \
            services/siw/airflow
          docker push $ECR_REGISTRY/mirai-airflow --all-tags

  deploy:
    needs: [build-and-push-airflow]
    if: ${{ always() && (needs.build-and-push-airflow.result == 'success' || needs.build-and-push-airflow.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AIRFLOW_EC2_HOST }}
          username: ${{ secrets.AIRFLOW_EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # ECR 로그인
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # env 파일 존재 확인 — 없으면 배포 중단
            if [ ! -f ~/.env.airflow ]; then
              echo "ERROR: ~/.env.airflow not found on host" >&2
              exit 1
            fi

            # 기존 컨테이너 정리
            docker stop airflow || true && docker rm airflow || true

            # 최신 이미지 pull
            docker pull ${{ secrets.ECR_REGISTRY }}/mirai-airflow:latest

            # 사용하지 않는 이미지 정리
            docker image prune -f

            # airflow 시작
            docker run -d --name airflow \
              --restart unless-stopped \
              --env-file ~/.env.airflow \
              -p 8080:8080 \
              -v airflow_db:/home/airflow \
              ${{ secrets.ECR_REGISTRY }}/mirai-airflow:latest \
              standalone
