name: Project Board Automation

on:
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened, ready_for_review, closed]

jobs:
  issue-automate:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Add to project & set status
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          ISSUE_URL="${{ github.event.issue.html_url }}"
          EVENT="${{ github.event.action }}"

          # 프로젝트에 이슈 추가 (이미 있어도 중복 안 됨)
          ITEM_ID=$(gh project item-add 2 \
            --owner 2026-SKP-MIRAI \
            --url "$ISSUE_URL" \
            --format json | jq -r '.id')

          if [ "$EVENT" = "opened" ]; then
            # 이슈 생성 → Backlog
            gh project item-edit \
              --project-id PVT_kwDOD6xar84BQesf \
              --id "$ITEM_ID" \
              --field-id PVTSSF_lADOD6xar84BQesfzg-liLk \
              --single-select-option-id f75ad846
            echo "→ Backlog"

          elif [ "$EVENT" = "assigned" ]; then
            # 이슈 Assign → In Progress
            gh project item-edit \
              --project-id PVT_kwDOD6xar84BQesf \
              --id "$ITEM_ID" \
              --field-id PVTSSF_lADOD6xar84BQesfzg-liLk \
              --single-select-option-id 47fc9ee4
            echo "→ In Progress"
          fi

  pr-automate:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Linked issues → In Review
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          REPO="${{ github.repository }}"

          # PR 본문에서 연결된 이슈 번호 추출 (Closes/Fixes/Resolves #N)
          ISSUE_NUMS=$(echo "$PR_BODY" | grep -oiE '(closes|fixes|resolves) #[0-9]+' | grep -oE '[0-9]+')

          if [ -z "$ISSUE_NUMS" ]; then
            echo "연결된 이슈 없음. 종료."
            exit 0
          fi

          for ISSUE_NUM in $ISSUE_NUMS; do
            ISSUE_URL="https://github.com/$REPO/issues/$ISSUE_NUM"
            echo "이슈 #$ISSUE_NUM → In Review 시도"

            # 프로젝트에 이슈 추가 (이미 있으면 기존 ID 반환)
            ITEM_ID=$(gh project item-add 2 \
              --owner 2026-SKP-MIRAI \
              --url "$ISSUE_URL" \
              --format json | jq -r '.id')

            # In Review로 이동
            gh project item-edit \
              --project-id PVT_kwDOD6xar84BQesf \
              --id "$ITEM_ID" \
              --field-id PVTSSF_lADOD6xar84BQesfzg-liLk \
              --single-select-option-id df73e18b
            echo "→ In Review (#$ISSUE_NUM)"
          done

  work-folder-automate:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PROJECT_TOKEN }}

      - name: Move active work folder → done
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          PR_NUM="${{ github.event.pull_request.number }}"

          # PR 본문에서 연결된 이슈 번호 추출
          ISSUE_NUMS=$(echo "$PR_BODY" | grep -oiE '(closes|fixes|resolves) #[0-9]+' | grep -oE '[0-9]+')

          if [ -z "$ISSUE_NUMS" ]; then
            echo "연결된 이슈 없음. 종료."
            exit 0
          fi

          MOVED=0
          for ISSUE_NUM in $ISSUE_NUMS; do
            # active/ 에서 이슈번호로 시작하는 폴더 찾기
            FOLDER=$(find docs/work/active -maxdepth 1 -type d -name "${ISSUE_NUM}-*" 2>/dev/null | head -1)

            if [ -n "$FOLDER" ]; then
              FOLDER_NAME=$(basename "$FOLDER")
              mv "$FOLDER" "docs/work/done/$FOLDER_NAME"
              echo "이동: $FOLDER_NAME → done/"
              MOVED=$((MOVED + 1))
            else
              echo "이슈 #$ISSUE_NUM 폴더 없음 (active/에 없거나 폴더 미생성). 스킵."
            fi
          done

          if [ "$MOVED" -gt 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: work 폴더 done/으로 이동 (PR #${PR_NUM})"
            git push
          else
            echo "이동할 폴더 없음."
          fi
